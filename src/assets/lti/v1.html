<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{.Title}}</title>
    <link rel="stylesheet" type="text/css" href="/assets/lti/css/style.css" />
  </head>
  <body>
    <div class="plugnmeet-lti">
      <div class="container">
        <div id="error-container" style="display: none"></div>
        <div class="column-full join-area">
          <button class="join">Join</button>
          <button class="end" style="display: none">End</button>
        </div>
        <div class="column column-full">
          <h1 class="headline">Recordings</h1>
          <div class="br">
            <div class="br-inner"></div>
          </div>
          <div class="recording-table">
            <div class="table-inner">
              <table class="table">
                <thead class="table-head">
                  <tr>
                    <th class="recording-date">
                      <strong>Recording date</strong>
                    </th>
                    <th class="meeting-date"><strong>Meeting date</strong></th>
                    <th class="file-size"><strong>File size (MB)</strong></th>
                    <th class="action"></th>
                  </tr>
                </thead>
                <tbody id="recordingListsBody"></tbody>
              </table>
            </div>
          </div>
        </div>
        <div class="pagination" style="display: none">
          <button id="backward">Prev</button>
          <button id="forward">Next</button>
        </div>
      </div>
    </div>

    <template id="recording-item-template">
      <tr class="table-item">
        <td class="recording-date"></td>
        <td class="meeting-date"></td>
        <td class="file-size"></td>
        <td class="action">
          <button class="download">Download</button>
          <button class="delete" style="display: none">Delete</button>
        </td>
      </tr>
    </template>

    <script type="text/javascript">
      const TOKEN = '{{.Token}}';
      const IS_ADMIN = {{.IsAdmin}};
      const DESIGN_CUSTOMIZATION = '{{.CustomDesign}}';
      if (DESIGN_CUSTOMIZATION !== "" && DESIGN_CUSTOMIZATION !== '{}') {
          window.DESIGN_CUSTOMIZATION = DESIGN_CUSTOMIZATION;
      }
    </script>

    <script src="/assets/config.js"></script>
    <script src="/assets/lti/js/v1.js"></script>
  </body>
</html>
